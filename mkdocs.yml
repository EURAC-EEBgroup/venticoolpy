site_name: VentiCoolPy
repo_url: https://gitlab.inf.unibz.it/eeb/vct/vctlib # TODO: update to github
copyright: Copyright &copy; 2025 Eurac Research
site_dir: site

nav:
  - Home: index.md
  - Overview: 
    - overview/index.md
    - "Building data": overview/building.md
    - "Climate Data": overview/climate_data.md 
    - "Ventilative cooling calculation method": overview/calculation.md
    - "Results": overview/results.md
  - Tutorials: tutorials.md
  - API Reference:
      - Models: reference/model.md
      - Simulation: reference/calculation.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.top
    - content.code.annotate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference


markdown_extensions:
  - toc
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins: 
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_section_style: spacy
            docstring_style: "numpy"
            separate_signature: true
            show_if_no_docstring: false
            merge_init_into_class: true
            show_symbol_type_heading: true # waiting for general release
            show_symbol_type_toc: true
            modernize_annotations: true
            summary: true
          inventories:
            - "https://docs.python.org/3/objects.inv"
